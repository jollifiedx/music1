<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snake Game</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: 'Courier New', monospace;
      color: #eee;
    }

    h1 {
      font-size: 2rem;
      letter-spacing: 4px;
      color: #4ecca3;
      margin-bottom: 12px;
      text-shadow: 0 0 20px #4ecca355;
    }

    #hud {
      display: flex;
      gap: 40px;
      margin-bottom: 16px;
      font-size: 1rem;
      letter-spacing: 2px;
    }

    #hud span { color: #4ecca3; font-weight: bold; }

    #canvas-wrapper {
      position: relative;
    }

    canvas {
      border: 2px solid #4ecca3;
      box-shadow: 0 0 30px #4ecca344;
      display: block;
    }

    #overlay {
      position: absolute;
      inset: 0;
      background: rgba(10, 10, 30, 0.88);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
    }

    #overlay h2 {
      font-size: 2rem;
      color: #4ecca3;
      letter-spacing: 3px;
    }

    #overlay p {
      color: #aaa;
      font-size: 0.95rem;
      letter-spacing: 1px;
    }

    #overlay .final-score {
      font-size: 1.2rem;
      color: #fff;
    }

    button {
      margin-top: 8px;
      padding: 10px 32px;
      background: #4ecca3;
      color: #1a1a2e;
      border: none;
      font-family: inherit;
      font-size: 1rem;
      font-weight: bold;
      letter-spacing: 2px;
      cursor: pointer;
      border-radius: 4px;
      transition: background 0.2s, transform 0.1s;
    }

    button:hover { background: #38b28a; transform: scale(1.05); }

    #controls {
      margin-top: 16px;
      font-size: 0.75rem;
      color: #555;
      letter-spacing: 1px;
      text-align: center;
      line-height: 1.8;
    }
  </style>
</head>
<body>
  <h1>SNAKE</h1>
  <div id="hud">
    <div>SCORE: <span id="score">0</span></div>
    <div>BEST: <span id="best">0</span></div>
    <div>LEVEL: <span id="level">1</span></div>
  </div>
  <div id="canvas-wrapper">
    <canvas id="canvas" width="400" height="400"></canvas>
    <div id="overlay">
      <h2 id="overlay-title">SNAKE</h2>
      <p id="overlay-msg">Navigate the snake to eat food</p>
      <p id="overlay-score" class="final-score"></p>
      <button id="btn">START</button>
    </div>
  </div>
  <div id="controls">
    WASD / Arrow Keys to move &nbsp;|&nbsp; P to pause
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const overlay = document.getElementById('overlay');
    const overlayTitle = document.getElementById('overlay-title');
    const overlayMsg = document.getElementById('overlay-msg');
    const overlayScore = document.getElementById('overlay-score');
    const btn = document.getElementById('btn');
    const scoreEl = document.getElementById('score');
    const bestEl = document.getElementById('best');
    const levelEl = document.getElementById('level');

    const GRID = 20;
    const COLS = canvas.width / GRID;
    const ROWS = canvas.height / GRID;

    let snake, dir, nextDir, food, score, best, level, speed, loop, paused, running;

    best = 0;

    function init() {
      snake = [
        { x: 10, y: 10 },
        { x: 9,  y: 10 },
        { x: 8,  y: 10 },
      ];
      dir = { x: 1, y: 0 };
      nextDir = { x: 1, y: 0 };
      score = 0;
      level = 1;
      speed = 150;
      paused = false;
      running = true;
      placeFood();
      updateHud();
      overlay.style.display = 'none';
      clearInterval(loop);
      loop = setInterval(tick, speed);
    }

    function placeFood() {
      let pos;
      do {
        pos = { x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS) };
      } while (snake.some(s => s.x === pos.x && s.y === pos.y));
      food = pos;
    }

    function tick() {
      if (paused) return;

      dir = nextDir;
      const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

      // Wall collision
      if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
        return gameOver();
      }
      // Self collision
      if (snake.some(s => s.x === head.x && s.y === head.y)) {
        return gameOver();
      }

      snake.unshift(head);

      if (head.x === food.x && head.y === food.y) {
        score += level * 10;
        if (score > best) best = score;
        // Level up every 5 foods
        if (score % 50 === 0) {
          level++;
          speed = Math.max(60, speed - 15);
          clearInterval(loop);
          loop = setInterval(tick, speed);
        }
        placeFood();
        updateHud();
      } else {
        snake.pop();
      }

      draw();
    }

    function draw() {
      // Background
      ctx.fillStyle = '#0d0d1a';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Grid dots
      ctx.fillStyle = '#ffffff08';
      for (let x = 0; x < COLS; x++) {
        for (let y = 0; y < ROWS; y++) {
          ctx.fillRect(x * GRID + GRID / 2 - 1, y * GRID + GRID / 2 - 1, 2, 2);
        }
      }

      // Food with glow
      const fx = food.x * GRID, fy = food.y * GRID;
      ctx.shadowColor = '#ff6b6b';
      ctx.shadowBlur = 12;
      ctx.fillStyle = '#ff6b6b';
      ctx.beginPath();
      ctx.arc(fx + GRID / 2, fy + GRID / 2, GRID / 2 - 3, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;

      // Snake
      snake.forEach((seg, i) => {
        const x = seg.x * GRID, y = seg.y * GRID;
        const ratio = 1 - i / snake.length;
        const alpha = 0.4 + ratio * 0.6;

        ctx.shadowColor = '#4ecca3';
        ctx.shadowBlur = i === 0 ? 14 : 4;

        // Body gradient from head to tail
        const g = i === 0
          ? '#4ecca3'
          : `rgba(${Math.round(78 * ratio)}, ${Math.round(204 * ratio)}, ${Math.round(163 * ratio)}, ${alpha})`;

        ctx.fillStyle = g;
        const pad = i === 0 ? 1 : 2;
        ctx.beginPath();
        ctx.roundRect(x + pad, y + pad, GRID - pad * 2, GRID - pad * 2, 3);
        ctx.fill();

        // Eyes on head
        if (i === 0) {
          ctx.shadowBlur = 0;
          ctx.fillStyle = '#1a1a2e';
          const ex = dir.y === 0 ? (dir.x > 0 ? 12 : 4) : 6;
          const ey = dir.x === 0 ? (dir.y > 0 ? 12 : 4) : 6;
          ctx.beginPath();
          ctx.arc(x + ex, y + ey, 2, 0, Math.PI * 2);
          ctx.fill();
          ctx.beginPath();
          ctx.arc(x + ex + (dir.y !== 0 ? 8 : 0), y + ey + (dir.x !== 0 ? 8 : 0), 2, 0, Math.PI * 2);
          ctx.fill();
        }
      });
      ctx.shadowBlur = 0;
    }

    function gameOver() {
      clearInterval(loop);
      running = false;
      overlayTitle.textContent = 'GAME OVER';
      overlayMsg.textContent = '';
      overlayScore.textContent = `Score: ${score}  |  Best: ${best}`;
      btn.textContent = 'PLAY AGAIN';
      overlay.style.display = 'flex';
    }

    function updateHud() {
      scoreEl.textContent = score;
      bestEl.textContent = best;
      levelEl.textContent = level;
    }

    btn.addEventListener('click', init);

    document.addEventListener('keydown', e => {
      if (!running) return;

      if (e.key === 'p' || e.key === 'P') {
        paused = !paused;
        return;
      }

      const map = {
        ArrowUp:    { x: 0, y: -1 },
        ArrowDown:  { x: 0, y:  1 },
        ArrowLeft:  { x: -1, y: 0 },
        ArrowRight: { x:  1, y: 0 },
        w: { x: 0, y: -1 }, W: { x: 0, y: -1 },
        s: { x: 0, y:  1 }, S: { x: 0, y:  1 },
        a: { x: -1, y: 0 }, A: { x: -1, y: 0 },
        d: { x:  1, y: 0 }, D: { x:  1, y: 0 },
      };
      const d = map[e.key];
      if (d && (d.x !== -dir.x || d.y !== -dir.y)) {
        nextDir = d;
        e.preventDefault();
      }
    });
  </script>
</body>
</html>
